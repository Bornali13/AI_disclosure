<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Disclosure - Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />

  <style>
    html, body {
      height: 100%;
    }

    body {
      margin: 0;
      background:
        linear-gradient(rgba(3, 10, 22, 0.72), rgba(6, 18, 34, 0.72)),
        linear-gradient(rgba(8, 37, 74, 0.34), rgba(5, 15, 33, 0.26)),
        url("/frontend/assets/login-background.jpg");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-repeat: no-repeat;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      overflow-x: hidden;
      overflow-y: auto;
    }

    .card-hero {
      border: 1px solid rgba(255,255,255,0.75);
      background: rgba(255,255,255,0.96);
      box-shadow: 0 24px 55px rgba(0, 0, 0, 0.28);
      border-radius: 16px;
    }

    .login-shell {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem 1.25rem;
    }

    .login-card-wrap {
      width: 100%;
      max-width: 480px;
    }

    .login-intro {
      text-shadow: 0 2px 16px rgba(4, 13, 28, 0.5);
    }

    .login-intro h1 {
      font-size: clamp(2rem, 4vw, 2.75rem);
      color: #ffffff;
    }

    .login-intro p {
      max-width: 48ch;
      margin-inline: auto;
      color: rgba(255,255,255,0.88) !important;
    }

    .card-hero .card-body {
      padding: 2.5rem 2.25rem !important;
    }

    .login-title {
      font-size: 2rem;
      font-weight: 700;
      color: #1f2430;
    }

    .form-control,
    .form-select {
      border: 0;
      border-bottom: 1px solid #d2d8e2;
      border-radius: 0;
      padding-left: 0;
      padding-right: 0;
      background-color: transparent;
      box-shadow: none;
    }

    .form-control:focus,
    .form-select:focus {
      border-color: #7a45f6;
      box-shadow: none;
    }

    .login-submit {
      border: 0;
      border-radius: 6px;
      background: linear-gradient(90deg, #0d3f73, #175792);
      box-shadow: 0 14px 28px rgba(10, 49, 92, 0.28);
    }

    .login-submit:hover {
      background: linear-gradient(90deg, #0a345d, #124a7e);
    }

    @media (max-width: 767.98px) {
      .login-shell {
        padding-top: 2.5rem;
      }
    }

    @media (max-width: 575.98px) {
      .card-hero .card-body {
        padding: 1.5rem !important;
      }
    }
  </style>
</head>
<body>
  <main class="login-shell">
    <div class="login-card-wrap">
      <div class="login-intro text-center mb-4">
        <h1 class="display-6 fw-semibold mb-3">AI Disclosure App</h1>
        <p class="lead mb-0">
          Transparency . Integrity . Authenticity
        </p>
      </div>

      <div class="card card-hero">
        <div class="card-body">
          <h2 class="login-title mb-3 text-center">Login</h2>
          <p class="text-secondary small mb-4 text-center">Enter your credentials to continue.</p>

          <div id="loginAlert" class="alert alert-danger d-none" role="alert"></div>

          <form id="loginForm" class="needs-validation" novalidate>
            <div class="mb-4">
              <label for="loginEmail" class="form-label text-secondary">Email address</label>
              <input type="email" id="loginEmail" class="form-control" autocomplete="email" required>
              <div class="invalid-feedback">Valid email required</div>
            </div>

            <div class="mb-4">
              <label for="loginPassword" class="form-label text-secondary">Password</label>
              <input type="password" id="loginPassword" class="form-control" minlength="6" autocomplete="current-password" required>
              <div class="invalid-feedback">Password must be at least 6 characters</div>
            </div>

            <div class="mb-4">
              <label for="loginRole" class="form-label text-secondary">Role</label>
              <select id="loginRole" class="form-select" required>
                <option value="student" selected>Student</option>
                <option value="teacher">Teacher</option>
              </select>
            </div>

            <button id="loginBtn" class="btn login-submit text-white w-100" type="submit">
              <i class="bi bi-box-arrow-in-right me-1"></i> Login Now
            </button>

            <div class="text-center mt-3">
              <a href="https://ai-admin-uka5.onrender.com/reset-password.html" class="text-decoration-none">
                Forgot Password?
              </a>
            </div>

            <div class="text-center mt-3">
              <span class="text-secondary">Not registered?</span>
              <a href="register.html" class="text-decoration-none"> Create a student account</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="/static/js/login.js"></script>
</body>
</html>

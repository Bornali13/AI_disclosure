<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Change Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h2 class="h4 mb-3">Change Password</h2>
                        <p class="text-muted">You must change your password before accessing the teacher dashboard.</p>

                    <div id="changeAlert" class="alert alert-danger d-none"></div>
                    <div id="changeSuccess" class="alert alert-success d-none"></div>

                    <form id="changePasswordForm">
                        <div class="mb-3">
                            <label class="form-label">Current Password</label>
                            <input type="password" id="currentPassword" class="form-control" required>
                        </div>

                    <div class="mb-3">
                        <label class="form-label">New Password</label>
                        <input type="password" id="newPassword" class="form-control" minlength="6" required>
                        </div>

                    <div class="mb-3">
                        <label class="form-label">Confirm New Password</label>
                        <input type="password" id="confirmPassword" class="form-control" minlength="6" required>
                    </div>

                    <button class="btn btn-primary w-100" type="submit">Update Password</button>
                    </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/change-password.js"></script>
</body>
</html>

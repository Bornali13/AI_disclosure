<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Disclosure • Reset Password</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />

  <style>
    body {
      background: linear-gradient(135deg, #f6f8ff 0%, #f1f5ff 40%, #eef7ff 100%);
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    .card-hero {
      border: 0;
      box-shadow: 0 10px 30px rgba(28, 87, 255, 0.08);
      border-radius: 18px;
    }

    .section-box {
      border: 1px solid #e9eefb;
      border-radius: 14px;
      padding: 1.25rem;
      background: #fff;
    }

    .section-title {
      font-weight: 700;
      color: #1f2a44;
    }

    .section-subtitle {
      color: #6b7280;
      font-size: 0.95rem;
    }

    .text-primary {
      color: #0d3f73 !important;
    }

    .btn-primary {
      border-color: #0d3f73;
      background: linear-gradient(90deg, #0d3f73, #175792);
      box-shadow: 0 14px 28px rgba(10, 49, 92, 0.18);
    }

    .btn-primary:hover,
    .btn-primary:focus,
    .btn-primary:active {
      border-color: #0a345d !important;
      background: linear-gradient(90deg, #0a345d, #124a7e) !important;
      box-shadow: 0 14px 28px rgba(10, 49, 92, 0.24) !important;
    }
  </style>
</head>
<body>
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-7">
        <div class="card card-hero">
          <div class="card-body p-4 p-lg-5">
            <div class="d-flex align-items-center gap-2 mb-3">
              <i class="bi bi-key fs-4 text-primary"></i>
              <h2 class="h4 mb-0">Reset Password</h2>
            </div>

            <p class="section-subtitle mb-4">
              Enter your email address to receive a verification code. After verifying the code, you can set a new password.
            </p>

            <div id="alertBox" class="alert alert-danger d-none" role="alert"></div>
            <div id="successBox" class="alert alert-success d-none" role="alert"></div>

            <div id="requestSection" class="section-box mb-4">
              <h3 class="h6 section-title mb-3">Step 1: Request OTP</h3>

              <form id="requestOtpForm" novalidate>
                <div class="mb-3">
                  <label for="email" class="form-label">Email Address</label>
                  <input
                    class="form-control"
                    id="email"
                    type="email"
                    placeholder="Enter your email"
                    required
                  />
                </div>

                <button id="requestOtpBtn" class="btn btn-primary w-100" type="submit">
                  Send OTP
                </button>
              </form>
            </div>

            <div id="verifySection" class="section-box mb-4 d-none">
              <h3 class="h6 section-title mb-3">Step 2: Verify OTP</h3>

              <form id="verifyOtpForm" novalidate>
                <div class="mb-3">
                  <label for="verifyEmail" class="form-label">Email Address</label>
                  <input
                    class="form-control"
                    id="verifyEmail"
                    type="email"
                    readonly
                  />
                </div>

                <div class="mb-3">
                  <label for="otp" class="form-label">Verification Code</label>
                  <input
                    class="form-control"
                    id="otp"
                    type="text"
                    placeholder="Enter OTP"
                    required
                  />
                </div>

                <button id="verifyOtpBtn" class="btn btn-outline-primary w-100" type="submit">
                  Verify OTP
                </button>
              </form>
            </div>

            <div id="passwordSection" class="section-box d-none">
              <h3 class="h6 section-title mb-3">Step 3: Set New Password</h3>

              <form id="resetPasswordForm" novalidate>
                <div class="mb-3">
                  <label for="resetEmail" class="form-label">Email Address</label>
                  <input
                    class="form-control"
                    id="resetEmail"
                    type="email"
                    readonly
                  />
                </div>

                <div class="mb-3">
                  <label for="newPassword" class="form-label">New Password</label>
                  <input
                    class="form-control"
                    id="newPassword"
                    type="password"
                    placeholder="New Password"
                    minlength="6"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label for="confirmPassword" class="form-label">Confirm Password</label>
                  <input
                    class="form-control"
                    id="confirmPassword"
                    type="password"
                    placeholder="Confirm Password"
                    minlength="6"
                    required
                  />
                </div>

                <button id="resetPasswordBtn" class="btn btn-success w-100" type="submit">
                  Reset Password
                </button>
              </form>
            </div>

            <div class="text-center mt-4">
              <a href="https://ai-portal-y1a1.onrender.com" class="text-decoration-none">Back to Login</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/reset-password.js"></script>
</body>
</html>

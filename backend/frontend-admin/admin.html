<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-light">

<div class="container py-5">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Admin Dashboard</h2>
    <button id="logoutBtn" class="btn btn-outline-danger btn-sm">Logout</button>
  </div>

  <div id="alertBox" class="alert alert-danger d-none"></div>
  <div id="successBox" class="alert alert-success d-none"></div>

  <div class="row g-4">

    <div class="col-md-6">
      <div class="card p-3 shadow-sm">
        <h5>Add Teacher</h5>
        <form id="teacherForm">
          <input class="form-control mb-2" id="tName" placeholder="Teacher Name" required>
          <input class="form-control mb-2" id="tEmail" type="email" placeholder="Teacher Email" required>
          <button class="btn btn-primary w-100" type="submit">Add Teacher</button>
        </form>
        <div class="form-text mt-2">A password setup/reset email will be sent to the teacher.</div>
      </div>
    </div>

    <div class="col-md-6">
      <div class="card p-3 shadow-sm">
        <h5>Add Student</h5>
        <form id="studentForm">
          <input class="form-control mb-2" id="sName" placeholder="Student Name" required>
          <input class="form-control mb-2" id="sEmail" type="email" placeholder="Student Email" required>
          <input class="form-control mb-2" id="sId" placeholder="Student ID" required>
          <button class="btn btn-success w-100" type="submit">Add Student</button>
        </form>
      </div>
    </div>

    <div class="col-md-6">
      <div class="card p-3 shadow-sm">
        <h5>Add Semester</h5>
        <form id="semesterForm">
          <input class="form-control mb-2" id="semesterName" placeholder="Semester Name (e.g. Semester 1, 2026)" required>
          <button class="btn btn-dark w-100" type="submit">Add Semester</button>
        </form>
      </div>
    </div>

    <div class="col-md-6">
      <div class="card p-3 shadow-sm">
        <h5>Add Course</h5>
        <form id="courseForm">
          <input class="form-control mb-2" id="courseCode" placeholder="Course Code (e.g. COMP501)" required>
          <input class="form-control mb-2" id="courseName" placeholder="Course Name" required>
          <button class="btn btn-warning w-100" type="submit">Add Course</button>
        </form>
      </div>
    </div>

    <div class="col-md-6">
      <div class="card p-3 shadow-sm">
        <h5>Assign Course to Semester</h5>
        <form id="assignSemesterCourseForm">
          <select class="form-select mb-2" id="assignSemesterName" required>
            <option value="">Select Semester</option>
          </select>
          <select class="form-select mb-2" id="assignSemesterCourseCode" required>
            <option value="">Select Course</option>
          </select>
          <button class="btn btn-secondary w-100" type="submit">Assign Course</button>
        </form>
      </div>
    </div>

    <div class="col-md-6">
      <div class="card p-3 shadow-sm">
        <h5>Add Assignment</h5>
        <form id="assignmentForm">
          <select class="form-select mb-2" id="assignmentCourseCode" required>
            <option value="">Select Course</option>
          </select>
          <input class="form-control mb-2" id="assignmentNumber" placeholder="Assignment Number (e.g. Assignment 1)" required>
          <input class="form-control mb-2" id="assignmentTitle" placeholder="Assignment Title" required>
          <button class="btn btn-success w-100" type="submit">Add Assignment</button>
        </form>
      </div>
    </div>

    <div class="col-md-6">
      <div class="card p-3 shadow-sm">
        <h5>Assign Teacher to Course</h5>
        <form id="assignTeacherForm">
          <select class="form-select mb-2" id="assignTeacherEmail" required>
            <option value="">Select Teacher</option>
          </select>
          <select class="form-select mb-2" id="assignCourseCode" required>
            <option value="">Select Course</option>
          </select>
          <button class="btn btn-info w-100" type="submit">Assign Teacher</button>
        </form>
      </div>
    </div>

    <div class="col-md-6">
      <div class="card p-3 shadow-sm">
        <h5>Send Password Reset Email</h5>
        <form id="adminResetPasswordForm">
          <select class="form-select mb-2" id="resetUserRole" required>
            <option value="">Select Role</option>
            <option value="student">Student</option>
            <option value="teacher">Teacher</option>
          </select>
          <input class="form-control mb-2" id="resetUserEmail" type="email" placeholder="User Email" required>
          <button class="btn btn-danger w-100" type="submit">Send Reset Email</button>
        </form>
      </div>
    </div>

  </div>
</div>

<script src="js/admin.js"></script>
</body>
</html>
